name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow running manually from the Actions tab.
  workflow_dispatch:

# Allow the workflow to write to GitHub Pages and create deployments.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on the same branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout implementation repo
        uses: actions/checkout@v4

      # Clone the management repo so generate-data.ts can read YAML files.
      # WORKSPACE_REPO_URL must be the SSH or HTTPS URL of the management repo.
      # WORKSPACE_MGMT_PATH is where it will be checked out on the runner.
      - name: Checkout management repo
        uses: actions/checkout@v4
        with:
          repository: tiendv89/project-workspace
          # Use a deploy key or PAT if the management repo is private.
          # token: ${{ secrets.WORKSPACE_REPO_TOKEN }}
          path: workspace-mgmt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generate public/data/features.json and per-feature task JSON files
      # from the checked-out management repo.
      - name: Generate static data
        run: npm run generate-data
        env:
          WORKSPACE_MGMT_PATH: ${{ github.workspace }}/workspace-mgmt

      # Build the Next.js app as a fully static export.
      # NEXT_PUBLIC_DATA_SOURCE=static activates output:'export' in next.config.ts
      # and selects StaticFeatureRepository in the data layer.
      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_DATA_SOURCE: static

      # Upload the out/ directory as a GitHub Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
