name: Release

# Build and publish the workflow-frontend image to GHCR at a chosen version,
# then create a matching git tag and GitHub release.
#
# NEXT_PUBLIC_* vars are baked into the Next.js client bundle at build time.
# Pass the production API URLs as workflow inputs before releasing.
#
# Published image: ghcr.io/<owner>/workflow-frontend:<version>

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        type: string
        required: true

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version_tag.outputs.value }}
      version_raw: ${{ steps.version_tag.outputs.raw }}
    steps:
      - name: Format version tag
        id: version_tag
        env:
          INPUT_TAG: ${{ github.event.inputs.version }}
        run: |
          TAG=${INPUT_TAG#v}
          echo "value=v$TAG" >> "$GITHUB_OUTPUT"
          echo "raw=$TAG" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION_RAW: ${{ needs.prepare.outputs.version_raw }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Set image name
        run: |
          OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER_LOWER}/workflow-frontend:${VERSION_RAW}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ghcr.io/${OWNER_LOWER}/workflow-frontend:latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}
            ${{ env.IMAGE_LATEST }}
          build-args: |
            NEXT_PUBLIC_WORKFLOW_API_URL=${{ github.event.inputs.workflow_api_url }}
            NEXT_PUBLIC_USER_SERVICE_URL=${{ github.event.inputs.user_service_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    env:
      VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create tag
        run: |
          git tag -d "$VERSION_TAG" 2>/dev/null || true
          git tag --annotate --message "workflow-frontend $VERSION_TAG" "$VERSION_TAG"
          git push --force origin "refs/tags/$VERSION_TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.VERSION_TAG }}
          prerelease: false
          name: "workflow-frontend ${{ env.VERSION_TAG }}"
